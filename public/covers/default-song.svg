<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title description">
  <title id="title">First Listen default song cover</title>
  <desc id="description">Abstract lime sound waves on a dark background.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151915"/>
      <stop offset="1" stop-color="#2b312b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#c8ff4f" stop-opacity=".28"/>
      <stop offset="1" stop-color="#c8ff4f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#background)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g fill="#c8ff4f">
    <rect x="180" y="350" width="34" height="100" rx="17"/>
    <rect x="238" y="292" width="34" height="216" rx="17"/>
    <rect x="296" y="230" width="34" height="340" rx="17"/>
    <rect x="354" y="318" width="34" height="164" rx="17"/>
    <rect x="412" y="258" width="34" height="284" rx="17"/>
    <rect x="470" y="198" width="34" height="404" rx="17"/>
    <rect x="528" y="278" width="34" height="244" rx="17"/>
    <rect x="586" y="338" width="34" height="124" rx="17"/>
  </g>
  <text x="400" y="690" fill="#f6f8f3" font-family="Arial, sans-serif" font-size="54" font-weight="700" text-anchor="middle">FIRST LISTEN</text>
</svg>
